<!DOCTYPE html>

    <meta name="description" content="History doesn't repeat itself. But you can witness it. — Witness Interactive">
    
    <!-- Preload critical resources -->
    <link rel="preload" href="css/style.css" as="style">

    <div id="app" role="main">

    <script type="module" src="js/main.js?v=2.1"></script>
