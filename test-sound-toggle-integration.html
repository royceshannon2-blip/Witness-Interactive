<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sound Toggle Integration Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .test-section {
            margin: 20px 0;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .sound-toggle-button {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(42, 47, 62, 0.9);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .sound-toggle-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .sound-toggle-button:hover:not(:disabled) {
            background: rgba(42, 47, 62, 0.95);
        }
        .sound-icon {
            font-size: 24px;
        }
        .pass { color: green; font-weight: bold; }
        .fail { color: red; font-weight: bold; }
        .log {
            background: #f5f5f5;
            padding: 10px;
            margin: 10px 0;
            border-left: 3px solid #333;
            font-family: monospace;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <h1>Sound Toggle Integration Test</h1>
    <p>Testing Task 3.2: Connect sound toggle button</p>
    
    <!-- Sound Toggle Button -->
    <button id="sound-toggle" class="sound-toggle-button" aria-label="Sound toggle" disabled>
        <span class="sound-icon">🔇</span>
    </button>
    
    <div id="app"></div>
    
    <div class="test-section">
        <h2>Test Results</h2>
        <div id="test-results"></div>
    </div>
    
    <div class="test-section">
        <h2>Event Log</h2>
        <div id="event-log"></div>
    </div>
    
    <script type="module">
        import EventBus from './js/engine/EventBus.js';
        import AmbientSoundManager from './js/engine/AmbientSoundManager.js';
        import UIController from './js/engine/UIController.js';
        
        const results = [];
        const eventLog = [];
        
        function logResult(testName, passed, details = '') {
            results.push({ testName, passed, details });
            updateResults();
        }
        
        function logEvent(eventName, data) {
            const timestamp = new Date().toLocaleTimeString();
            eventLog.push({ timestamp, eventName, data });
            updateEventLog();
        }
        
        function updateResults() {
            const resultsDiv = document.getElementById('test-results');
            resultsDiv.innerHTML = results.map(r => 
                `<div class="${r.passed ? 'pass' : 'fail'}">
                    ${r.passed ? '✓' : '✗'} ${r.testName}
                    ${r.details ? `<br><small>${r.details}</small>` : ''}
                </div>`
            ).join('');
        }
        
        function updateEventLog() {
            const logDiv = document.getElementById('event-log');
            logDiv.innerHTML = eventLog.map(e => 
                `<div class="log">
                    [${e.timestamp}] <strong>${e.eventName}</strong>
                    ${e.data ? `<br>${JSON.stringify(e.data, null, 2)}` : ''}
                </div>`
            ).join('');
        }
        
        // Run tests
        async function runTests() {
            console.log('Starting sound toggle integration tests...');
            
            // Test 1: Components exist
            const eventBus = new EventBus();
            logResult('EventBus created', eventBus !== null);
            
            const ambientSoundManager = new AmbientSoundManager(eventBus, {
                defaultVolume: 0.6,
                crossfadeDuration: 1000
            });
            logResult('AmbientSoundManager created', ambientSoundManager !== null);
            
            // Test 2: Sound toggle button exists
            const soundToggleButton = document.getElementById('sound-toggle');
            logResult('Sound toggle button exists', soundToggleButton !== null);
            logResult('Button initially disabled', soundToggleButton.disabled === true);
            
            // Test 3: Listen for events
            let soundToggleEmitted = false;
            let soundMutedEmitted = false;
            let mutedState = null;
            
            eventBus.on('sound:toggle', () => {
                soundToggleEmitted = true;
                logEvent('sound:toggle', null);
            });
            
            eventBus.on('sound:muted', (data) => {
                soundMutedEmitted = true;
                mutedState = data.muted;
                logEvent('sound:muted', data);
            });
            
            // Test 4: Create UIController with minimal config
            const uiController = new UIController(
                eventBus,
                null, // timelineSelector
                null, // missionRegistry
                null, // consequenceSystem
                null, // resultsCard
                {}, // uiContent
                { ambientSoundManager } // components
            );
            
            logResult('UIController created', uiController !== null);
            
            // Test 5: Button should now be enabled
            await new Promise(resolve => setTimeout(resolve, 100));
            logResult('Button enabled after UIController setup', !soundToggleButton.disabled);
            
            // Test 6: Check initial icon
            const soundIcon = soundToggleButton.querySelector('.sound-icon');
            logResult('Sound icon exists', soundIcon !== null);
            logResult('Initial icon is unmuted (🔊)', soundIcon.textContent === '🔊');
            
            // Test 7: Click button to toggle mute
            console.log('Clicking sound toggle button...');
            soundToggleButton.click();
            
            await new Promise(resolve => setTimeout(resolve, 100));
            
            logResult('sound:toggle event emitted', soundToggleEmitted);
            logResult('sound:muted event emitted', soundMutedEmitted);
            logResult('Muted state is true', mutedState === true);
            logResult('Icon changed to muted (🔇)', soundIcon.textContent === '🔇');
            logResult('AmbientSoundManager.isMuted() returns true', ambientSoundManager.isMuted() === true);
            
            // Test 8: Click again to unmute
            soundToggleEmitted = false;
            soundMutedEmitted = false;
            
            console.log('Clicking sound toggle button again...');
            soundToggleButton.click();
            
            await new Promise(resolve => setTimeout(resolve, 100));
            
            logResult('sound:toggle event emitted (2nd click)', soundToggleEmitted);
            logResult('sound:muted event emitted (2nd click)', soundMutedEmitted);
            logResult('Muted state is false', mutedState === false);
            logResult('Icon changed back to unmuted (🔊)', soundIcon.textContent === '🔊');
            logResult('AmbientSoundManager.isMuted() returns false', ambientSoundManager.isMuted() === false);
            
            // Test 9: Verify aria-label updates
            const ariaLabel = soundToggleButton.getAttribute('aria-label');
            logResult('Aria-label updated', ariaLabel.includes('Sound is on'));
            
            // Summary
            const passedCount = results.filter(r => r.passed).length;
            const totalCount = results.length;
            console.log(`Tests complete: ${passedCount}/${totalCount} passed`);
            
            if (passedCount === totalCount) {
                console.log('✓ All tests passed! Task 3.2 is complete.');
            } else {
                console.log('✗ Some tests failed. Review the results above.');
            }
        }
        
        runTests().catch(error => {
            console.error('Test error:', error);
            logResult('Test execution', false, error.message);
        });
    </script>
</body>
</html>
