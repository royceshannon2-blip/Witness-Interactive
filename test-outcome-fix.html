<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Outcome Fix</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-result { padding: 10px; margin: 10px 0; border-radius: 5px; }
        .pass { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .fail { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Test: White Screen Crash Fix</h1>
    <p>This test verifies that the SceneStateMachine correctly handles both "outcome" and null nextScene values.</p>
    
    <button onclick="testOutcomeString()">Test nextScene: "outcome"</button>
    <button onclick="testOutcomeNull()">Test nextScene: null</button>
    <button onclick="testJapaneseAviatorFinalScene()">Test Japanese Aviator Final Scene</button>
    
    <div id="results"></div>

    <script type="module">
        import EventBus from './js/engine/EventBus.js';
        import SceneStateMachine from './js/engine/SceneStateMachine.js';
        import { japaneseAviator } from './js/content/missions/pearl-harbor/japanese-aviator.js';

        const results = document.getElementById('results');

        function addResult(test, passed, message) {
            const div = document.createElement('div');
            div.className = `test-result ${passed ? 'pass' : 'fail'}`;
            div.innerHTML = `<strong>${test}:</strong> ${passed ? 'PASS' : 'FAIL'} - ${message}`;
            results.appendChild(div);
        }

        window.testOutcomeString = function() {
            const eventBus = new EventBus();
            const stateMachine = new SceneStateMachine(eventBus);
            
            let roleCompleteEventFired = false;
            eventBus.on('role:complete', (data) => {
                roleCompleteEventFired = true;
                addResult('nextScene: "outcome"', true, 'role:complete event fired correctly');
            });

            // Create a test scene
            const testScene = {
                id: 'test-scene',
                narrative: 'Test narrative',
                apThemes: ['causation'],
                choices: [{
                    id: 'test-choice',
                    text: 'Test choice',
                    consequences: {},
                    nextScene: 'outcome'
                }]
            };

            stateMachine.loadRole('test-mission', 'test-role', [testScene]);
            
            try {
                stateMachine.transitionTo('outcome');
                if (roleCompleteEventFired) {
                    addResult('nextScene: "outcome"', true, 'Transition completed without error');
                } else {
                    addResult('nextScene: "outcome"', false, 'role:complete event not fired');
                }
            } catch (error) {
                addResult('nextScene: "outcome"', false, `Error: ${error.message}`);
            }
        };

        window.testOutcomeNull = function() {
            const eventBus = new EventBus();
            const stateMachine = new SceneStateMachine(eventBus);
            
            let roleCompleteEventFired = false;
            eventBus.on('role:complete', (data) => {
                roleCompleteEventFired = true;
                addResult('nextScene: null', true, 'role:complete event fired correctly');
            });

            // Create a test scene
            const testScene = {
                id: 'test-scene',
                narrative: 'Test narrative',
                apThemes: ['causation'],
                choices: [{
                    id: 'test-choice',
                    text: 'Test choice',
                    consequences: {},
                    nextScene: null
                }]
            };

            stateMachine.loadRole('test-mission', 'test-role', [testScene]);
            
            try {
                stateMachine.transitionTo(null);
                if (roleCompleteEventFired) {
                    addResult('nextScene: null', true, 'Transition completed without error');
                } else {
                    addResult('nextScene: null', false, 'role:complete event not fired');
                }
            } catch (error) {
                addResult('nextScene: null', false, `Error: ${error.message}`);
            }
        };

        window.testJapaneseAviatorFinalScene = function() {
            const eventBus = new EventBus();
            const stateMachine = new SceneStateMachine(eventBus);
            
            let roleCompleteEventFired = false;
            eventBus.on('role:complete', (data) => {
                roleCompleteEventFired = true;
                addResult('Japanese Aviator Final Scene', true, 'role:complete event fired correctly');
            });

            try {
                stateMachine.loadRole('pearl-harbor', 'japanese-aviator', japaneseAviator.scenes);
                
                // Find the final scene (ja-scene-05)
                const finalScene = japaneseAviator.scenes.find(scene => scene.id === 'ja-scene-05');
                if (!finalScene) {
                    addResult('Japanese Aviator Final Scene', false, 'Final scene ja-scene-05 not found');
                    return;
                }

                // Check that the final scene has nextScene: "outcome"
                const finalChoice = finalScene.choices[0];
                if (finalChoice.nextScene === 'outcome') {
                    addResult('Japanese Aviator Final Scene', true, 'Final scene uses nextScene: "outcome"');
                    
                    // Test the transition
                    stateMachine.transitionTo('outcome');
                    if (roleCompleteEventFired) {
                        addResult('Japanese Aviator Final Scene', true, 'Transition completed without error');
                    } else {
                        addResult('Japanese Aviator Final Scene', false, 'role:complete event not fired');
                    }
                } else {
                    addResult('Japanese Aviator Final Scene', false, `Final scene uses nextScene: ${finalChoice.nextScene} instead of "outcome"`);
                }
            } catch (error) {
                addResult('Japanese Aviator Final Scene', false, `Error: ${error.message}`);
            }
        };
    </script>
</body>
</html>
